version: '3.8'

services:
  fairscore:
    build: .
    ports:
      - "8000:8000"
      - "5173:5173"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./backend/app:/app/backend/app
      - ./frontend/src:/app/frontend/src
    stdin_open: true
    tty: true

  # Optional: Add a PostgreSQL service if needed for local testing
  # postgres:
  #   image: postgres:15
